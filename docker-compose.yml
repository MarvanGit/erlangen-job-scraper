services:
  # --- 1. THE DATABASE SERVICE ---
  db:
    image: postgres:15-alpine
    environment:
      # THE SECRETS PROBLEM: For now, we are hardcoding these. 
      # We will fix this bad practice later.
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # This saves your database files to your laptop so data isn't lost on restart.
      - postgres_data:/var/lib/postgresql/data

  # --- 2. THE API SERVICE ---
  api:
    build: . # Tells Compose to look for the Dockerfile in this folder
    ports:
      - "8000:8000"
    volumes:
      # This creates a "wormhole" between your laptop and the container.
      # When you edit main.py in VS Code, it updates inside the container instantly!
      - ./app:/code/app
    environment:
      # THE NETWORKING PROBLEM SOLVED: 
      # Notice the URL is postgresql://user:pass@db:5432/...
      # We use '@db' instead of '@localhost' because 'db' is the name of the service above!
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      # THE BOOT-ORDER PROBLEM SOLVED:
      # FastAPI boots in 0.5s. Postgres takes 3s. 
      # This tells FastAPI to wait for the DB to exist before starting.
      - db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  
  worker:
    build: .
    # The worker uses the EXACT same code and Docker image as the API!
    volumes:
      - ./app:/code/app
    # But instead of booting up uvicorn, it boots up the Celery consumer process
    command: celery -A app.worker.celery_app worker -B -s /tmp/celerybeat-schedule --loglevel=info
    environment:
      # The worker needs to know how to connect to Postgres too!
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
      - redis
# Declare the volume we used in the db service
volumes:
  postgres_data:









